<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>발표뽑기</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header style="position: relative;">
      <h1 id="app-title">🎰 두근두근 발표뽑기! 🎰</h1>
      <button id="settings-btn" class="settings-btn" title="설정">⚙️</button>
      <p class="subtitle">오늘의 주인공은 누구일까요?</p>
    </header>

    <main>
      <div id="lottery-machine" class="lottery-machine">
        <div id="glass-globe" class="glass-globe">
          <!-- 공들이 동적으로 추가됨 -->
        </div>
        <div class="machine-base">
          <div class="pipe"></div>
          <div id="ball-tray" class="ball-tray">
            <!-- 뽑힌 공들이 동적으로 추가됨 -->
          </div>
        </div>
      </div>
      <div class="pick-count-section">
        <p>한 번에 뽑을 학생 수를 선택하세요.</p>
        <div class="pick-count-buttons" id="pick-count-buttons">
          <button class="pick-btn" data-val="1">1</button>
          <button class="pick-btn" data-val="2">2</button>
          <button class="pick-btn active" data-val="3">3</button>
          <button class="pick-btn" data-val="4">4</button>
          <button class="pick-btn" data-val="5">5</button>
          <button class="pick-btn" data-val="6">6</button>
          <button class="pick-btn" data-val="7">7</button>
          <button class="pick-btn" data-val="8">8</button>
          <button class="pick-btn" data-val="9">9</button>
          <button class="pick-btn" data-val="10">10</button>
          <button class="pick-btn" data-val="11">11</button>
          <button class="pick-btn" data-val="12">12</button>
        </div>
      </div>
      
      <div class="controls">
        <button id="start-btn" class="start-btn">뽑기 시작!</button>
      </div>
    </main>

    <!-- 비밀 모달창 (선생님 전용 설정창) -->
    <div id="secret-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>선생님 설정 모드 🤫</h2>
          <button id="close-modal-btn" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="total-students">총 학생 수 (최대 번호):</label>
            <input type="number" id="total-students" value="20" min="1" max="100">
            <small>※ 아래에 학생 이름 정보를 추가하면, 뽑기 공에 번호 대신 이름이 표시됩니다.</small>
          </div>
          <div class="form-group">
            <label>학생 번호 및 이름 추가:</label>
            <div class="add-student-container">
              <input type="number" id="new-student-num" placeholder="번호" min="1">
              <input type="text" id="new-student-name" placeholder="이름">
              <button id="add-student-btn" type="button" class="add-btn">추가</button>
            </div>
            <ul id="student-list" class="student-list">
              <!-- Students will be added here -->
            </ul>
          </div>
          <div class="form-group">
            <label for="secret-sequence">비밀 순서 (쉼표로 구분, 예: 5,12,7):</label>
            <input type="text" id="secret-sequence" placeholder="입력하지 않으면 완전 랜덤">
            <small>※ 입력한 인원 수와 쉼표 개수가 일치하게 적어주세요. 입력하지 않으면 랜덤으로 뽑힙니다.</small>
          </div>
        </div>
        <div class="modal-footer">
          <button id="save-settings-btn" class="save-btn">저장 및 닫기</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
